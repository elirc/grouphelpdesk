# Author: Jordan Park
# Issue: #26 â€” Validate the monorepo on push and pull request

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate --workspace @helpdesk/server

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test --workspaces --if-present
