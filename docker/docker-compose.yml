# Issue: #25 â€” Compose local client and server services

services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    environment:
      DATABASE_URL: file:/data/helpdesk.db
      PORT: 3001
      LOG_LEVEL: info
    ports:
      - "3001:3001"
    volumes:
      - helpdesk-sqlite:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  helpdesk-sqlite:
